name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ]
  repository_dispatch:
    types: [ rebuild ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Astro
        run: npm run build
        env:
          # Aggiungiamo eventuali segreti necessari per la build
          FACTORY_API_TOKEN: ${{ secrets.FACTORY_API_TOKEN }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ github.event.repository.name }}
          directory: ./dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
